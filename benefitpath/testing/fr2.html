<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formless — V2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0E1713; overflow: hidden; }

    @keyframes fr2-wave {
      0%, 100% { transform: scaleY(0.08); opacity: 0.25; }
      50%       { transform: scaleY(1);    opacity: 1;    }
    }

    @keyframes fr2-pulse {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 1;   }
    }

    @keyframes fr2-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes fr2-shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }

    @keyframes fr2-seal {
      0%   { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0%   0 0); }
    }

    @keyframes fr2-count-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .fr2-waveform-bar {
      width: 3px;
      border-radius: 2px;
      transform-origin: bottom;
      animation: fr2-wave var(--dur, 1s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .fr2-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: currentColor;
      margin-left: 2px;
      vertical-align: middle;
      animation: fr2-blink 0.85s step-end infinite;
    }

    .fr2-dot-loader span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #8FA899;
      animation: fr2-pulse 1.2s ease-in-out infinite;
    }
    .fr2-dot-loader span:nth-child(2) { animation-delay: 0.2s; }
    .fr2-dot-loader span:nth-child(3) { animation-delay: 0.4s; }

    .fr2-input:focus { outline: none; }
    .fr2-input::placeholder { color: #4A6355; }

    .fr2-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: #243D2E transparent; }
    .fr2-scroll::-webkit-scrollbar { width: 4px; }
    .fr2-scroll::-webkit-scrollbar-track { background: transparent; }
    .fr2-scroll::-webkit-scrollbar-thumb { background: #243D2E; border-radius: 2px; }

    .fr2-tap { transition: opacity 0.15s; cursor: pointer; }
    .fr2-tap:hover { opacity: 0.82; }
    .fr2-tap:active { opacity: 0.65; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/fr2/fr2-main.jsx"></script>
</body>
</html>
